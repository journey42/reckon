name: Deploy Backend Container App

on:
  push:
    branches: [ master ]
    paths:
      - Dockerfile
      - requirements.txt
      - rxconfig.py
      - rhiz/**
      - scripts/**
  workflow_dispatch:

env:
  IMAGE_NAME: rhiz-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          token=$(az acr login --name ${{ secrets.ACR_NAME }} --expose-token --output tsv --query accessToken)
          echo "$token" | docker login ${{ secrets.ACR_LOGIN_SERVER }} --username 00000000-0000-0000-0000-000000000000 --password-stdin

      - name: Build backend image
        run: |
          TAG=${GITHUB_SHA::7}
          docker build \
            --build-arg API_URL=${{ secrets.PUBLIC_API_URL }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${TAG} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:latest \
            .

      - name: Push backend image
        run: |
          TAG=${GITHUB_SHA::7}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${TAG}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:latest

      - name: Update Container App
        uses: azure/cli@v1
        with:
          inlineScript: |
            set -euo pipefail
            TAG=${GITHUB_SHA::7}
            DB_CONN="${{ secrets.DB_URL }}"

            az containerapp secret set \
              --name ${{ secrets.CONTAINERAPP_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --secrets db-url="$DB_CONN"

            NEW_REVISION=$(az containerapp update \
              --name ${{ secrets.CONTAINERAPP_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${TAG} \
              --set-env-vars API_URL=${{ secrets.PUBLIC_API_URL }} \
                             SUNEDITOR_TOOLBAR_ENABLED=0 \
                             DB_URL=secretref:db-url \
              --query properties.latestRevisionName -o tsv)

            echo "Deployed revision: ${NEW_REVISION:-<unknown>}"

            if [ -n "${NEW_REVISION}" ]; then
              echo "Waiting for revision ${NEW_REVISION} to become active..."
              for i in $(seq 1 12); do
                STATE=$(az containerapp revision show \
                  --name ${{ secrets.CONTAINERAPP_NAME }} \
                  --resource-group ${{ secrets.RESOURCE_GROUP }} \
                  --revision "$NEW_REVISION" \
                  --query properties.runningState -o tsv || true)
                if [ "$STATE" = "Running" ]; then
                  echo "Revision ${NEW_REVISION} is running."
                  break
                fi
                sleep 10
              done
              az containerapp revision show \
                --name ${{ secrets.CONTAINERAPP_NAME }} \
                --resource-group ${{ secrets.RESOURCE_GROUP }} \
                --revision "$NEW_REVISION"
            fi
