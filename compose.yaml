# During build and run, set environment DOMAIN pointing
# to publicly accessible domain where app will be hosted
services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    container_name: postgres-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: reckon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reckon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    image: reckon
    build:
      context: .
      args:
        API_URL: https://${DOMAIN:-http://localhost:8000}
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_URL: "https://${DOMAIN:-http://localhost:8000}"
      DB_URL: "postgresql://postgres:password@db:5432/reckon"
      TRANSFORMERS_CACHE: "/tmp/.cache/huggingface/hub"
    ports:
      - 8000:8000
      - 3000:3000   
  webserver:
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      API_URL: "app:8000"
      UI_URL: "app:3000"
    ports:
      - 443:443
      - 80:80  # for acme-challenge via HTTP
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    depends_on:
      - app

volumes:
  postgres_data:
